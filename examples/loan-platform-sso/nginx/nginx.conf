events {}
http {
  include /etc/nginx/mime.types;

  server {
    listen 8443 ssl;
    server_name localhost;
    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # Use Docker's embedded DNS resolver so upstream names are resolved at
    # request time (not at startup). Required when containers may not yet be
    # running during `nginx -t`.
    resolver 127.0.0.11 valid=10s;

    # oauth2-proxy endpoints
    location /oauth2/ {
      set $oauth2_proxy oauth2-proxy:4180;
      proxy_pass http://$oauth2_proxy;
      proxy_set_header Host                    $host;
      proxy_set_header X-Real-IP               $remote_addr;
      proxy_set_header X-Forwarded-Proto       $scheme;
    }
    location = /oauth2/auth {
      set $oauth2_proxy oauth2-proxy:4180;
      proxy_pass http://$oauth2_proxy;
      proxy_set_header Host             $host;
      proxy_set_header X-Real-IP        $remote_addr;
      proxy_set_header X-Forwarded-Uri  $request_uri;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
    }

    # All app routes require a valid session
    location / {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;
      auth_request_set $token $upstream_http_x_auth_request_access_token;
      root /usr/share/nginx/html;          # welcome page (Task 10)
      try_files $uri $uri/ /index.html;
    }

    location /control/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;
      set $flowset_control flowset-control:8081;
      proxy_pass http://$flowset_control/;
      proxy_set_header Host $host;
    }

    location /tasklist/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;
      set $flowset_tasklist flowset-tasklist:3000;
      proxy_pass http://$flowset_tasklist/;
      proxy_set_header Host $host;
    }

    # Redoc API docs at the exact path
    location = /engine-rest {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;
      root /usr/share/nginx/html;
      try_files /engine-rest-docs.html =404;
    }

    # Live REST API
    location /engine-rest/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in;
      auth_request_set $token $upstream_http_x_auth_request_access_token;
      set $operaton operaton:8080;
      proxy_pass http://$operaton/engine-rest/;
      proxy_set_header Host $host;
      # BEARER_OAUTH2 mode only: forward the Keycloak access token as Bearer.
      # Harmless if the engine ignores it; comment out for BASIC_IDP if it conflicts.
      proxy_set_header Authorization "Bearer $token";
    }
  }
}
