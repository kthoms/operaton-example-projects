provider = "oidc"
# skip_oidc_discovery separates the browser-visible authorization endpoint
# (localhost:8180 — the exposed Keycloak port) from the container-internal
# token/JWK endpoints (keycloak:8080 — the Docker service name).
# oidc_issuer_url must match the `iss` claim in JWTs: tokens are redeemed via
# keycloak:8080 (backchannel), so without KC_HOSTNAME Keycloak uses that host
# for the issuer dynamically.
skip_oidc_discovery = true
login_url = "http://localhost:8180/realms/operaton/protocol/openid-connect/auth"
redeem_url = "http://keycloak:8080/realms/operaton/protocol/openid-connect/token"
oidc_jwks_url = "http://keycloak:8080/realms/operaton/protocol/openid-connect/certs"
oidc_issuer_url = "http://keycloak:8080/realms/operaton"
client_id = "oauth2-proxy"
client_secret = "oauth2-proxy-secret"
redirect_url = "http://localhost:8080/oauth2/callback"
email_domains = ["*"]
cookie_secret = "TapL17A1Kyn52L5DY_8rbc-4fB1wQRB7EVw4Q9XFcHk="
cookie_secure = false
reverse_proxy = true
code_challenge_method = "S256"
http_address = "0.0.0.0:4180"
upstreams = ["static://200"]
set_xauthrequest = true
pass_access_token = true
