apiVersion: operaton-starter/v1

repository:
  name: "Operaton Example Projects"
  description: "Comprehensive, end-to-end use-case applications built on Operaton — the open-source BPMN process engine."
  maintainer:
    name: "Karsten Thoms"
    url: "https://github.com/kthoms"

examples:
  - id: operaton-flowset-sso
    title: Operaton + Flowset with Keycloak SSO
    path: examples/operaton-flowset-sso
    description: >
      Demonstrates the Operaton + Flowset + Keycloak SSO platform stack: REST-only
      Operaton engine behind a nginx/oauth2-proxy SSO gateway, Flowset Control and
      Tasklist for task management, and a plain-Java external-task worker. A
      loan-application process serves as the example workload.
    tags: [keycloak, sso, flowset, external-task, nginx, docker-compose]
    screenshots:
      - examples/operaton-flowset-sso/engine/resources/loan-application.png
