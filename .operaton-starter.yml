apiVersion: operaton-starter/v1

repository:
  name: "Operaton Example Projects"
  description: "Comprehensive, end-to-end use-case applications built on Operaton — the open-source BPMN process engine."
  maintainer:
    name: "Karsten Thoms"
    url: "https://github.com/kthoms"

examples:
  - id: loan-platform-sso
    title: Loan Platform SSO
    path: examples/loan-platform-sso
    description: >
      Complete secured BPM platform: Operaton engine (REST-only) behind Keycloak SSO,
      operated through Flowset Control and Tasklist, with a plain-Java external-task
      worker handling service work and nginx/oauth2-proxy providing single sign-on.
    tags: [keycloak, sso, flowset, external-task, nginx, docker-compose]
    screenshots:
      - examples/loan-platform-sso/engine/resources/loan-application.png
